        - uuid: 26df7609c1a1439bbc20a0391705879d
          name: 'ONU Status Collection'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#INTERFACE},1.3.6.1.2.1.31.1.1.1.1, {#ONUSTATUS},1.3.6.1.4.1.3902.1082.500.10.2.3.8.1.4]'
          key: onuStatusCollection
          delay: 10m
          history: 7d
          value_type: TEXT
          trends: '0'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  /* ---------- ONU status counters per OLT and per PON port (Rhino-safe) ---------- */
                  
                  var arr = JSON.parse(value);      // `value` is the raw discovery-rule JSON array
                  
                  /* map cardIndex → portName (rows that carry an {#INTERFACE}), GPON only */
                  var idx2name = {};
                  for (var i = 0; i < arr.length; i++) {
                      var r = arr[i];
                      if (r['{#INTERFACE}'] && /^gpon_/i.test(r['{#INTERFACE}'])) {
                          idx2name[r['{#SNMPINDEX}']] = r['{#INTERFACE}'];
                      }
                  }
                  
                  /* factory for a fresh zeroed counter object */
                  function newCounters () {
                      return {
                          los:0, working:0, dyinggasp:0, unknown:0,
                          offlineTotal:0,
                          total:0
                      };
                  }
                  
                  function parsePortName(name) {
                      var m = /^gpon_(\d+)\/(\d+)\/(\d+)$/.exec(name || '');
                      if (!m) return null;
                      return { rack: parseInt(m[1], 10), shelf: parseInt(m[2], 10), port: parseInt(m[3], 10) };
                  }
                  
                  function buildPortEntry(name) {
                      var c = newCounters();
                      var p = parsePortName(name);
                      if (p) {
                          c.rack  = p.rack;
                          c.shelf = p.shelf;
                          c.slot  = p.port;
                      }
                      return c;
                  }
                  
                  var perPort  = {};          // portName → counters + position
                  /* pre-fill every discovered port with zeroed counters so JSONPath never misses */
                  for (var idx in idx2name) {
                      if (idx2name.hasOwnProperty(idx)) {
                          var name = idx2name[idx];
                          if (name) perPort[name] = buildPortEntry(name);
                      }
                  }
                  /* helper: decode numeric PON index (0x11 rr ss pp) -> 'gpon_r/s/p' */
                  function decodePonName (numStr) {
                      var n = parseInt(numStr, 10);
                      if (isNaN(n)) return null;
                      var b3 = (n >> 24) & 0xff;
                      if (b3 !== 0x11) return null;
                      var rack  = (n >> 16) & 0xff;
                      var shelf = (n >> 8)  & 0xff;
                      var port  = n & 0xff;
                      return 'gpon_' + rack + '/' + shelf + '/' + port;
                  }
                  
                  /* convert status-code → counter key */
                  function keyOf (code) {
                      if      (code === '2') return 'los';
                      else if (code === '4') return 'working';
                      else if (code === '5') return 'dyinggasp';
                      return 'unknown'; // any other status is treated as unknown
                  }
                  
                  var oltTotal = newCounters();
                  
                  /* walk every ONU row (rows that have {#ONUSTATUS}) and accumulate */
                  for (var j = 0; j < arr.length; j++) {
                      var row    = arr[j];
                      var status = row['{#ONUSTATUS}'];
                      if (!status) continue;                       // skip non-ONU rows
                  
                      var fullIdx  = row['{#SNMPINDEX}'];          // e.g. 285278721.17
                      var portIdx  = fullIdx.split('.')[0];        // part before the dot
                      var portName = decodePonName(portIdx);       // derive gpon_#/#/# from numeric
                      if (!portName) continue;                     // skip non-GPON or unknown pattern
                  
                      if (!perPort[portName]) perPort[portName] = buildPortEntry(portName);
                  
                      var k = keyOf(status);
                  
                      /* increment the specific counter */
                      perPort[portName][k] += 1;
                      oltTotal[k]          += 1;
                  
                      /* working = online; everything else counts as offline */
                      if (k !== 'working') {
                          perPort[portName].offlineTotal += 1;
                          oltTotal.offlineTotal          += 1;
                      }
                  
                      /* totals (all states) */
                      perPort[portName].total += 1;
                      oltTotal.total          += 1;
                  }
                  
                  /* final structure keyed by interface name */
                  var out = {
                      olt     : oltTotal,
                      per_pon : perPort
                  };
                  
                  return JSON.stringify({ data: out });
