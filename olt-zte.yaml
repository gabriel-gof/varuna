        - uuid: 599fc41427db4902b6ed0be2dd8cf236
          name: 'ONUs Discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#INTERFACE},1.3.6.1.2.1.31.1.1.1.1, {#ONUNAME},1.3.6.1.4.1.3902.1082.500.10.2.3.3.1.2, {#ONUSERIAL}, 1.3.6.1.4.1.3902.1082.500.10.2.3.3.1.18]'
          key: onuDiscovery
          enabled_lifetime_type: DISABLE_NEVER
          item_prototypes:
            - uuid: fae7fdec42d14ca0b9b6d202d91a9814
              name: 'ONU {#RACK}/{#SHELF}/{#PORT}/{#ONUID} {#SERIAL} {#NAME}: OLT Rx Power'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.3902.1082.500.1.2.4.2.1.2.{#PONID}.{#ONUID}'
              key: 'oltRxPower[{#PONID}.{#ONUID}]'
              delay: 1d
              history: 7d
              value_type: FLOAT
              trends: 180d
              units: dBm
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var v = parseInt(value, 10);
                      if (isNaN(v) || v === -80000) return null;
                      return Math.round((v / 1000.0) * 100) / 100;
                  error_handler: DISCARD_VALUE
              tags:
                - tag: onu_power
                  value: olt_rx
            - uuid: 0f28afec45764dbb93097257e1124c70
              name: 'ONU {#RACK}/{#SHELF}/{#PORT}/{#ONUID} {#SERIAL} {#NAME}: Rx Power'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.3902.1082.500.20.2.2.2.1.10.{#PONID}.{#ONUID}.1'
              key: 'onuRxPower[{#PONID}.{#ONUID}]'
              delay: 1d
              history: 7d
              value_type: FLOAT
              trends: 180d
              units: dBm
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var raw = parseInt(value, 10);
                      if (isNaN(raw)) return null;
                      var out;
                      if (raw >= 0 && raw <= 32767)      out = (raw * 0.002) - 30;
                      else if (raw > 32767 && raw < 65535) out = ((raw - 65535) * 0.002) - 30;
                      else return null;
                      if (out < -50 || out > 10) return null;
                      return Math.round(out * 100) / 100;
                  error_handler: DISCARD_VALUE
              tags:
                - tag: onu_power
                  value: onu_rx
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  /**
                   * Zabbix JavaScript pre-processing
                   * Input  : value  (string)
                   * Output : string – [{"{#RACK}":...}, ...]
                   *
                   * The SNMP walk mixes GPON interface rows and ONU rows.
                   * Interface rows carry {#INTERFACE}; ONU rows carry {#ONUNAME}/{#ONUSERIAL}.
                   * PON location (rack/shelf/port) is encoded in the numeric part of the
                   * ONU index (before the dot), not in the IF-MIB ifIndex, so we must decode
                   * it directly instead of mapping IF-MIB indexes.
                   */
                  
                  var raw = JSON.parse(value);
                  
                  /* decode numeric PON id (0x11 rr ss pp) -> {rack,shelf,port} */
                  function decodePon (ponId) {
                      var n = parseInt(ponId, 10);
                      if (isNaN(n)) return null;
                      var b3 = (n >> 24) & 0xff;
                      if (b3 !== 0x11) return null; // not a GPON PON-id
                      return {
                          rack:  (n >> 16) & 0xff,
                          shelf: (n >> 8)  & 0xff,
                          port:  n & 0xff
                      };
                  }
                  
                  var out = [];
                  raw.forEach(function (e) {
                      /* keep only rows that really are ONU lines */
                      if (!e['{#ONUNAME}'] || !e['{#ONUSERIAL}']) return;
                  
                      /* split "285278721.17"  ->  [ "285278721", "17" ] */
                      var parts = String(e['{#SNMPINDEX}']).split('.');
                      if (parts.length !== 2) return;              // corrupted index, skip
                  
                      var ponId = parts[0];
                      var onuId = parseInt(parts[1], 10);
                      if (isNaN(onuId)) return;
                  
                      var loc = decodePon(ponId);
                      if (!loc) return;                            // non-GPON → ignore
                  
                      /* clean up the serial (discard the leading “1,”) */
                      var serial = e['{#ONUSERIAL}'];
                      if (serial.indexOf(',') !== -1) {
                          serial = serial.split(',')[1];
                      }
                  
                      out.push({
                          "{#RACK}"  : loc.rack,
                          "{#SHELF}" : loc.shelf,
                          "{#PORT}"  : loc.port,
                          "{#PONID}" : parseInt(ponId, 10),
                          "{#ONUID}" : onuId,
                          "{#SERIAL}": serial,
                          "{#NAME}"  : e['{#ONUNAME}']
                      });
                  });
                  
                  return JSON.stringify(out);
