              key: 'uplinkIfOperStatus[{#SNMPINDEX}]'
              history: 7d
              trends: 180d
              tags:
                - tag: interface
                  value: uplink
                - tag: health
                  value: status
              trigger_prototypes:
                - uuid: 25a51dff0f5b4451bd85a652308427dc
                  expression: 'last(/Template OLT Fiberhome/uplinkIfOperStatus[{#SNMPINDEX}])=2 and (last(/Template OLT Fiberhome/uplinkIfOperStatus[{#SNMPINDEX}],#1)<>last(/Template OLT Fiberhome/uplinkIfOperStatus[{#SNMPINDEX}],#2))=1'
                  name: 'Interface {#SNMPVALUE}: Link inativo'
                  priority: AVERAGE
                  manual_close: 'YES'
            - uuid: 4ee07b80c33446478e47a0ed06c37acb
              name: 'Interface {#SNMPVALUE}: Speed'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.31.1.1.1.15.{#SNMPINDEX}'
              key: 'uplinkIfSpeed[{#SNMPINDEX}]'
              delay: 5m
              history: 7d
              trends: 180d
              units: bps
              preprocessing:
                - type: MULTIPLIER
                  parameters:
                    - '1000000'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              tags:
                - tag: interface
                  value: uplink
          trigger_prototypes:
            - uuid: db155775da9e4d54ba3b69d7ccbbdb16
              expression: |
                (avg(/Template OLT Fiberhome/uplinkIfHCInOctets[{#SNMPINDEX}],15m)>({$IF.UTIL.MAX}/100)*last(/Template OLT Fiberhome/uplinkIfSpeed[{#SNMPINDEX}]) or
                avg(/Template OLT Fiberhome/uplinkIfHCOutOctets[{#SNMPINDEX}],15m)>({$IF.UTIL.MAX}/100)*last(/Template OLT Fiberhome/uplinkIfSpeed[{#SNMPINDEX}])) and
                last(/Template OLT Fiberhome/uplinkIfSpeed[{#SNMPINDEX}])>0
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: |
