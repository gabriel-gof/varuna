                  value: uplink
                - tag: traffic
                  value: in
            - uuid: 7612bba1084848b4980d9070e05fe124
              name: 'Interface {#SNMPVALUE}: Bits sent'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.31.1.1.1.10.{#SNMPINDEX}'
              key: 'uplinkIfHCOutOctets[{#SNMPINDEX}]'
              delay: 5m
