        - uuid: bbb1c3126084452ba76c2a0f0d7d288c
          name: 'OLT: OLT Rx Power Collection'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#INTERFACE_NAME},1.3.6.1.4.1.5875.800.3.9.3.4.1.2,{#INTERFACE_INDEX},1.3.6.1.4.1.5875.800.3.9.3.4.1.1,{#OLT_RX_POWER},1.3.6.1.4.1.5875.800.3.9.3.7.1.2]'
          key: oltRxPowerCollection
          delay: 1d
          history: 1d
          value_type: TEXT
          trends: '0'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  /**
                   * OLT Rx Power Collection - Fiberhome
                   * Walks interface mapping + OLT Rx power OIDs only
                   */

                  var raw = JSON.parse(value);
                  var result = {
                      power_data: {},
                      signal_quality: {
                          good_olt_rx: 0,
                          bad_olt_rx: 0,
                          total_discovered_onus: 0
                      }
                  };

                  var oltRxThreshold = parseFloat('{$OLT.RX.POWER.THRESHOLD}');

                  function roundTo2Decimals(value) {
                      return Math.round(value * 100) / 100;
                  }

                  // Build interface mapping
                  var interfaces = {};
                  raw.forEach(function(item) {
                      var interfaceName = item['{#INTERFACE_NAME}'];
                      var snmpIndex = item['{#SNMPINDEX}'];

                      if (interfaceName && snmpIndex && !item['{#OLT_RX_POWER}']) {
                          interfaces[snmpIndex] = interfaceName;
                      }
                  });

                  // Collect OLT Rx Power data
                  var MIN_VALID_POWER = -50;
                  var MAX_VALID_POWER = 10;

                  raw.forEach(function(item) {
                      var oltRxPowerRaw = item['{#OLT_RX_POWER}'];
                      var snmpIndex = item['{#SNMPINDEX}'];

                      if (oltRxPowerRaw !== undefined && oltRxPowerRaw !== '' && snmpIndex) {
                          var indexParts = snmpIndex.split('.');
                          if (indexParts.length >= 2) {
                              var interfaceIndex = indexParts[0];
                              var onuPosition = indexParts.slice(1).join('.');

                              if (interfaces[interfaceIndex]) {
                                  var interfaceName = interfaces[interfaceIndex];
                                  var onuKey = interfaceName + "/" + onuPosition;
                                  var oltRxPower = roundTo2Decimals(parseFloat(oltRxPowerRaw) * 0.01);

                                  result.signal_quality.total_discovered_onus++;

                                  if (!isNaN(oltRxPower) && isFinite(oltRxPower) && oltRxPower >= MIN_VALID_POWER && oltRxPower <= MAX_VALID_POWER) {
                                      result.power_data[onuKey] = {
                                          olt_rx_power: oltRxPower
                                      };
                                      if (oltRxPower < oltRxThreshold) {
                                          result.signal_quality.bad_olt_rx++;
                                      } else {
                                          result.signal_quality.good_olt_rx++;
                                      }
                                  }
                              }
                          }
                      }
                  });

                  return JSON.stringify(result);
        - uuid: c8d9e0f1a2b34cd586f7a8b9c0d1e2f3
          name: 'OLT: ONU Rx Power Collection'
          type: SNMP_AGENT
