          key: onuRxPowerCollection
          delay: 1d
          history: 1d
          value_type: TEXT
          trends: '0'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  /**
                   * ONU Rx Power Collection - Fiberhome
                   * Walks ONU Rx power + PON name OIDs only
                   */

                  var raw = JSON.parse(value);
                  var result = {
                      power_data: {},
                      signal_quality: {
                          good_onu_rx: 0,
                          bad_onu_rx: 0,
                          total_discovered_onus: 0
                      }
                  };

                  var onuRxThreshold = parseFloat('{$ONU.RX.POWER.THRESHOLD}');

                  function roundTo2Decimals(value) {
                      return Math.round(value * 100) / 100;
                  }

                  var MIN_VALID_POWER = -50;
                  var MAX_VALID_POWER = 10;

                  raw.forEach(function(item) {
                      var onuRxPowerRaw = item['{#ONU_RX_POWER}'];
                      var ponName = item['{#PON_NAME}'];
                      var snmpIndex = item['{#SNMPINDEX}'];

                      if (onuRxPowerRaw !== undefined && onuRxPowerRaw !== '' && ponName && snmpIndex) {
                          var onuRxPower = roundTo2Decimals(parseFloat(onuRxPowerRaw) * 0.01);

                          result.signal_quality.total_discovered_onus++;

                          if (!isNaN(onuRxPower) && isFinite(onuRxPower) && onuRxPower >= MIN_VALID_POWER && onuRxPower <= MAX_VALID_POWER) {
                              result.power_data[ponName] = {
