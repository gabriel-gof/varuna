        - uuid: df0266fae0fc49adb6f694039d38822b
          name: 'OLT: ONU Status Collection'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#SLOT},1.3.6.1.4.1.5875.800.3.10.1.1.2,{#PON},1.3.6.1.4.1.5875.800.3.10.1.1.3,{#STATUS},1.3.6.1.4.1.5875.800.3.10.1.1.11]'
          key: onuStatus
          delay: 10m
          history: 1d
          value_type: TEXT
          trends: '0'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var data = JSON.parse(value);
                  var summary = {
                    total: {
                      authorized: 0,
                      online: 0,
                      dying_gasp: 0, 
                      link_loss: 0,
                      unknown: 0,
                      offline: 0  // dying_gasp + link_loss + unknown
                    },
                    by_pon: {}
                  };
                  
                  data.forEach(function(onu) {
                    var slot = onu['{#SLOT}'];
                    var pon = onu['{#PON}'];
                    var status = onu['{#STATUS}'];
                    
                    // Only process status 0, 1, 2, 3 - discard everything else
                    if (status !== '0' && status !== '1' && status !== '2' && status !== '3') {
                      return; // Skip this ONU completely
                    }
                    
                    var statusName;
                    switch(status) {
                      case '0': statusName = 'link_loss'; break;
                      case '1': statusName = 'online'; break;
                      case '2': statusName = 'dying_gasp'; break;
                      case '3': statusName = 'unknown'; break;
                    }
                    
                    summary.total.authorized++;
                    summary.total[statusName]++;
                    
                    // Count offline (everything that is NOT online - status 0, 2, 3)
                    if (status !== '1') {
                      summary.total.offline++;
                    }
                    
                    var ponKey = 'PON ' + slot + '/' + pon;
                    if (!summary.by_pon[ponKey]) {
                      summary.by_pon[ponKey] = {
                        authorized: 0,
                        online: 0,
                        dying_gasp: 0,
                        link_loss: 0,
                        unknown: 0,
                        offline: 0
                      };
                    }
                    
                    summary.by_pon[ponKey].authorized++;
                    summary.by_pon[ponKey][statusName]++;
                    
                    // Count offline per PON (everything NOT online)
                    if (status !== '1') {
                      summary.by_pon[ponKey].offline++;
                    }
                  });
                  
                  return JSON.stringify(summary);
