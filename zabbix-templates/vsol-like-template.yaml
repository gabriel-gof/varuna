zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: 63951cbce75f45cebf403ab7fb0eeb23
      name: Templates/OLT
  templates:
    - uuid: d2d6689b7e3847d18e9c242a7aef5ef0
      template: 'OLT VSOL GPON 8P'
      name: 'OLT VSOL GPON 8P'
      description: |
        Minimal template for Varuna collection.
        Scope:
        - ONU discovery
        - ONU status (reason encoded in status value)
        - ONU RX power (direct SNMP per ONU)
      groups:
        - name: Templates/OLT
      macros:
        - macro: '{$VARUNA.DISCOVERY_INTERVAL}'
          value: 5m
        - macro: '{$VARUNA.STATUS_INTERVAL}'
          value: 1m
        - macro: '{$VARUNA.POWER_INTERVAL}'
          value: 5m
        - macro: '{$VARUNA.HISTORY_DAYS}'
          value: 7d
      discovery_rules:
        - uuid: 110f443a2e5744c19f28236b0869082c
          name: 'ONU Discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#ONU_NAME},1.3.6.1.4.1.37950.1.1.6.1.1.4.1.24,{#SERIAL},1.3.6.1.4.1.37950.1.1.6.1.1.4.1.5]'
          key: onuDiscovery
          delay: '{$VARUNA.DISCOVERY_INTERVAL}'
          lifetime_type: DELETE_IMMEDIATELY
          lifetime: '0'
          description: 'Builds ONU LLD rows from VSOL-like index format <pon>.<onu>.'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var rows = JSON.parse(value);
                  var output = [];

                  function normalizeSerial(raw) {
                      var serialLike = /^[A-Z]{4}[A-Z0-9-]{4,28}$/;
                      var sentinel = ['N/A', 'NA', 'NONE', 'NULL', '--', '-'];
                      var input = String(raw || '').trim().toUpperCase();
                      if (!input) {
                          return '';
                      }
                      var parts = input.split(',').map(function(part) {
                          return String(part || '').trim().replace(/^[\[\(\{]+|[\]\)\},;:]+$/g, '');
                      }).filter(function(part) {
                          return part.length > 0;
                      });
                      for (var i = 0; i < parts.length; i += 1) {
                          if (serialLike.test(parts[i])) {
                              return parts[i].replace(/-/g, '');
                          }
                      }
                      var serial = parts.length > 0 ? parts[0] : input.replace(/^[\[\(\{]+|[\]\)\},;:]+$/g, '');
                      if (!serial || sentinel.indexOf(serial) >= 0) {
                          return '';
                      }
                      return serial;
                  }

                  rows.forEach(function(row) {
                      var indexStr = String(row['{#SNMPINDEX}'] || '').trim();
                      if (!indexStr) {
                          return;
                      }

                      var parts = indexStr.split('.');
                      if (parts.length < 2) {
                          return;
                      }

                      var pon = parseInt(parts[0], 10);
                      var onuId = parseInt(parts[parts.length - 1], 10);
                      if (!isFinite(pon) || !isFinite(onuId) || pon <= 0 || onuId <= 0) {
                          return;
                      }

                      var slot = 1;
                      var onuName = String(row['{#ONU_NAME}'] || '').trim();
                      var serial = normalizeSerial(row['{#SERIAL}']);

                      output.push({
                          '{#SNMPINDEX}': indexStr,
                          '{#SLOT}': String(slot),
                          '{#PON}': String(pon),
                          '{#ONU_ID}': String(onuId),
                          '{#ONU_NAME}': onuName,
                          '{#SERIAL}': serial,
                          '{#ONU_PATH}': String(slot) + '/' + String(pon) + '/' + String(onuId)
                      });
                  });

                  return JSON.stringify(output);
          item_prototypes:
            - uuid: b42ad096112e4805862f7ed52b647cf3
              name: 'ONU {#SLOT}/{#PON}/{#ONU_ID} {#ONU_NAME} {#SERIAL}: Status'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.37950.1.1.6.1.1.1.1.5.{#SNMPINDEX}'
              key: 'onuStatusValue[{#SNMPINDEX}]'
              delay: '{$VARUNA.STATUS_INTERVAL}'
              history: '{$VARUNA.HISTORY_DAYS}'
              value_type: TEXT
              trends: '0'
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var raw = String(value || '').trim();
                      if (raw === '3') {
                          return 'online';
                      }
                      if (raw === '1' || raw === '2') {
                          return 'link_loss';
                      }
                      if (raw === '4' || raw === '5') {
                          return 'dying_gasp';
                      }
                      return 'unknown';
                  error_handler: DISCARD_VALUE
              tags:
                - tag: collector
                  value: varuna
                - tag: metric
                  value: onu_status
                - tag: slot
                  value: '{#SLOT}'
                - tag: pon
                  value: '{#PON}'
            - uuid: 3b25e5d5046b480ca827b66d0bdb4e84
              name: 'ONU {#SLOT}/{#PON}/{#ONU_ID} {#ONU_NAME} {#SERIAL}: ONU Rx power'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.37950.1.1.6.1.1.3.1.7.{#SNMPINDEX}'
              key: 'onuRxPower[{#SNMPINDEX}]'
              delay: '{$VARUNA.POWER_INTERVAL}'
              history: '{$VARUNA.HISTORY_DAYS}'
              value_type: FLOAT
              trends: '0'
              units: dBm
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var raw = parseFloat(value);
                      if (!isFinite(raw)) {
                          return '';
                      }

                      var n = raw;
                      if (n <= -40 || n >= 0) {
                          var by10 = raw / 10;
                          if (by10 > -40 && by10 < 0) {
                              n = by10;
                          } else {
                              var by100 = raw / 100;
                              if (by100 > -40 && by100 < 0) {
                                  n = by100;
                              } else {
                                  return '';
                              }
                          }
                      }

                      if (Math.abs(n) < 0.0001 || Math.abs(n + 40) < 0.0001) {
                          return '';
                      }
                      if (n <= -40 || n >= 0) {
                          return '';
                      }
                      return Math.round(n * 100) / 100;
                  error_handler: DISCARD_VALUE
              tags:
                - tag: collector
                  value: varuna
                - tag: metric
                  value: onu_rx_power
                - tag: slot
                  value: '{#SLOT}'
                - tag: pon
                  value: '{#PON}'
