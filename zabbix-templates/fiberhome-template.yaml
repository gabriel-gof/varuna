zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: fca9a32d65354d2492adbfa5a2840a3f
      name: Templates/OLT
  templates:
    - uuid: 1748d2d3ddd5431ba7e7492e81f9ed7e
      template: 'OLT Fiberhome Unified'
      name: 'OLT Fiberhome Unified'
      description: |
        Minimal template for Varuna collection.
        Scope:
        - ONU discovery
        - ONU status (reason encoded in status value)
        - ONU RX and OLT RX power (direct SNMP per ONU)
      groups:
        - name: Templates/OLT
      macros:
        - macro: '{$VARUNA.DISCOVERY_INTERVAL}'
          value: 5m
        - macro: '{$VARUNA.STATUS_INTERVAL}'
          value: 1m
        - macro: '{$VARUNA.POWER_INTERVAL}'
          value: 5m
        - macro: '{$VARUNA.HISTORY_DAYS}'
          value: 7d
      discovery_rules:
        - uuid: 2d2506d0ac5b4f84af882f55d13e35fe
          name: 'ONU Discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#SLOT},1.3.6.1.4.1.5875.800.3.10.1.1.2,{#PON},1.3.6.1.4.1.5875.800.3.10.1.1.3,{#SERIAL},1.3.6.1.4.1.5875.800.3.10.1.1.10]'
          key: onuDiscovery
          delay: '{$VARUNA.DISCOVERY_INTERVAL}'
          lifetime_type: DELETE_IMMEDIATELY
          lifetime: '0'
          description: 'Builds ONU LLD rows and derives ONU/OLT RX index helpers from flat Fiberhome SNMP index.'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var rows = JSON.parse(value);
                  var output = [];

                  function normalizeSerial(raw) {
                      var serial = String(raw || '').trim().toUpperCase();
                      if (!serial || ['N/A', 'NA', 'NONE', 'NULL', '--', '-'].indexOf(serial) >= 0) {
                          return 'UNKNOWN';
                      }
                      return serial;
                  }

                  rows.forEach(function(row) {
                      var indexStr = String(row['{#SNMPINDEX}'] || '').trim();
                      var slotStr = String(row['{#SLOT}'] || '').trim();
                      var ponStr = String(row['{#PON}'] || '').trim();
                      if (!indexStr || !slotStr || !ponStr) {
                          return;
                      }

                      var indexNum = parseInt(indexStr, 10);
                      if (!isFinite(indexNum) || indexNum <= 0) {
                          return;
                      }

                      var slot = parseInt(slotStr, 10);
                      var pon = parseInt(ponStr, 10);
                      var onuId = (indexNum >> 8) & 0xFF;

                      if (!isFinite(slot) || !isFinite(pon) || !isFinite(onuId) || slot <= 0 || pon <= 0 || onuId <= 0) {
                          return;
                      }

                      var ponBase = indexNum & 0xFFFF0000;
                      var serial = normalizeSerial(row['{#SERIAL}']);
                      var onuPath = String(slot) + '/' + String(pon) + '/' + String(onuId);

                      output.push({
                          '{#SNMPINDEX}': indexStr,
                          '{#SLOT}': String(slot),
                          '{#PON}': String(pon),
                          '{#ONU_ID}': String(onuId),
                          '{#SERIAL}': serial,
                          '{#ONU_PATH}': onuPath,
                          '{#OLT_RX_INDEX}': String(ponBase) + '.' + String(onuId)
                      });
                  });

                  return JSON.stringify(output);
          item_prototypes:
            - uuid: 41ea8fa737be4ee88f1f66ef18fe6f03
              name: 'ONU {#ONU_PATH} {#SERIAL}: Status'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.5875.800.3.10.1.1.11.{#SNMPINDEX}'
              key: 'onuStatusValue[{#SNMPINDEX}]'
              delay: '{$VARUNA.STATUS_INTERVAL}'
              history: '{$VARUNA.HISTORY_DAYS}'
              value_type: TEXT
              trends: '0'
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var raw = String(value || '').trim();
                      if (raw === '1') {
                          return 'online';
                      }
                      if (raw === '0') {
                          return 'link_loss';
                      }
                      if (raw === '2') {
                          return 'dying_gasp';
                      }
                      return 'unknown';
                  error_handler: DISCARD_VALUE
              tags:
                - tag: collector
                  value: varuna
                - tag: metric
                  value: onu_status
                - tag: slot
                  value: '{#SLOT}'
                - tag: pon
                  value: '{#PON}'
            - uuid: 937d6e22cf824d66bfb83832f3816e67
              name: 'ONU {#ONU_PATH} {#SERIAL}: ONU Rx power'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.5875.800.3.9.3.3.1.6.{#SNMPINDEX}'
              key: 'onuRxPower[{#SNMPINDEX}]'
              delay: '{$VARUNA.POWER_INTERVAL}'
              history: '{$VARUNA.HISTORY_DAYS}'
              value_type: FLOAT
              trends: '0'
              units: dBm
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var n = parseFloat(value);
                      if (!isFinite(n)) {
                          return '';
                      }
                      n = n * 0.01;
                      if (Math.abs(n) < 0.0001 || Math.abs(n + 40) < 0.0001) {
                          return '';
                      }
                      if (n <= -40 || n >= 0) {
                          return '';
                      }
                      return Math.round(n * 100) / 100;
                  error_handler: DISCARD_VALUE
              tags:
                - tag: collector
                  value: varuna
                - tag: metric
                  value: onu_rx_power
                - tag: slot
                  value: '{#SLOT}'
                - tag: pon
                  value: '{#PON}'
            - uuid: 4e2768f1bf6842d1a12fdd84088f2e28
              name: 'ONU {#ONU_PATH} {#SERIAL}: OLT Rx power'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.5875.800.3.9.3.7.1.2.{#OLT_RX_INDEX}'
              key: 'oltRxPower[{#SNMPINDEX}]'
              delay: '{$VARUNA.POWER_INTERVAL}'
              history: '{$VARUNA.HISTORY_DAYS}'
              value_type: FLOAT
              trends: '0'
              units: dBm
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var n = parseFloat(value);
                      if (!isFinite(n)) {
                          return '';
                      }
                      n = n * 0.01;
                      if (Math.abs(n) < 0.0001 || Math.abs(n + 40) < 0.0001) {
                          return '';
                      }
                      if (n <= -40 || n >= 0) {
                          return '';
                      }
                      return Math.round(n * 100) / 100;
                  error_handler: DISCARD_VALUE
              tags:
                - tag: collector
                  value: varuna
                - tag: metric
                  value: olt_rx_power
                - tag: slot
                  value: '{#SLOT}'
                - tag: pon
                  value: '{#PON}'
