<VirtualHost *:443>
    ServerName ${SERVER_NAME}
    
    SSLEngine on
    SSLCertificateFile /etc/apache2/ssl/fullchain.pem
    SSLCertificateKeyFile /etc/apache2/ssl/privkey.pem
    SSLProtocol all -SSLv3 -TLSv1.2
    
    # Security headers
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    
    # CORS
    Header always set Access-Control-Allow-Origin "https://${SERVER_NAME}"
    Header always set Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS"
    Header always set Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization"
    Header always set Access-Control-Expose-Headers "Content-Length,X-MyHeader"
    
    # Django API (WSGI)
    WSGIDaemonProcess varuna python-path=/app:/usr/lib/python3/dist-packages:/usr/local/lib/python3.11/site-packages processes=4 threads=15
    WSGIProcessGroup varuna
    WSGIScriptAlias /api/ /app/varuna/wsgi.py
    WSGIScriptAlias /admin/ /app/varuna/wsgi.py
    RedirectMatch 301 ^/api$ /api/
    RedirectMatch 301 ^/admin$ /admin/
    WSGIPassAuthorization On

    <Directory /app/varuna>
        Require all granted
    </Directory>
    
    # Proxy frontend (production build)
    ProxyPreserveHost On
    ProxyPass /api/ !
    ProxyPass /api !
    ProxyPass /admin/ !
    ProxyPass /admin !
    ProxyPass /static/ !
    ProxyPass /static !
    ProxyPass / http://frontend:80/
    ProxyPassReverse / http://frontend:80/
    
    # Static files
    Alias /static/ /var/www/static/
    <Directory /var/www/static/>
        Require all granted
    </Directory>
    
    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined
</VirtualHost>

# HTTP to HTTPS redirect
<VirtualHost *:80>
    ServerName ${SERVER_NAME}
    Redirect permanent / https://${SERVER_NAME}/
</VirtualHost>
