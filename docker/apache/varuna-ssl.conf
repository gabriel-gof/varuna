<VirtualHost *:443>
    ServerName ${SERVER_NAME}
    
    SSLEngine on
    SSLCertificateFile /etc/apache2/ssl/fullchain.pem
    SSLCertificateKeyFile /etc/apache2/ssl/privkey.pem
    SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite HIGH:!aNULL:!MD5
    
    # Security headers
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    
    # CORS
    Header always set Access-Control-Allow-Origin "https://${SERVER_NAME}"
    Header always set Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH"
    Header always set Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization"
    Header always set Access-Control-Expose-Headers "Content-Length,Content-Range"
    
    # Django API (WSGI)
    WSGIDaemonProcess varuna python-path=/app processes=${WSGI_PROCESSES} threads=${WSGI_THREADS} display-name=%{GROUP}
    WSGIProcessGroup varuna
    WSGIApplicationGroup %{GLOBAL}
    WSGIScriptAlias / /app/varuna/wsgi.py
    WSGIPassAuthorization On

    <Directory /app/varuna>
        Require all granted
    </Directory>
    
    # Static files
    Alias /static/ /var/www/static/
    <Directory /var/www/static/>
        Require all granted
        ExpiresActive On
        ExpiresDefault "access plus 1 year"
    </Directory>
    
    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined
</VirtualHost>

# HTTP to HTTPS redirect
<VirtualHost *:80>
    ServerName ${SERVER_NAME}
    Redirect permanent / https://${SERVER_NAME}/
</VirtualHost>
