<VirtualHost *:80>
    ServerName ${SERVER_NAME}
    ServerAlias ${SERVER_ALIASES}
    
    # CORS
    Header always set Access-Control-Allow-Origin "*"
    Header always set Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH"
    Header always set Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization"
    Header always set Access-Control-Expose-Headers "Content-Length,Content-Range"
    
    # Django API (WSGI)
    WSGIDaemonProcess varuna python-path=/app processes=${WSGI_PROCESSES} threads=${WSGI_THREADS} display-name=%{GROUP}
    WSGIProcessGroup varuna
    WSGIApplicationGroup %{GLOBAL}
    WSGIScriptAlias / /app/varuna/wsgi.py
    WSGIPassAuthorization On
    
    <Directory /app/varuna>
        Require all granted
    </Directory>

    # Static files
    Alias /static/ /var/www/static/
    <Directory /var/www/static/>
        Require all granted
        ExpiresActive On
        ExpiresDefault "access plus 1 year"
    </Directory>

    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined
</VirtualHost>
