services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${VARUNA_REDIS_LIMIT_MEMORY:-256M}
          cpus: '${VARUNA_REDIS_LIMIT_CPUS:-0.5}'

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      redis:
        condition: service_started
    env_file:
      - ${VARUNA_ENV_FILE:-docker/prod.env}
    environment:
      POSTGRES_HOST: ${VARUNA_POSTGRES_HOST:-pg-varuna}
      DEBUG: "False"
      BACKEND_BEHIND_FRONTEND_PROXY: "1"
    ports:
      - "${VARUNA_BACKEND_BIND_IP:-127.0.0.1}:${VARUNA_BACKEND_HOST_PORT:-8080}:80"
    volumes:
      - static:/var/www/static
      - ${VARUNA_TLS_CERTS_DIR:-/etc/letsencrypt}:/etc/apache2/ssl:ro
    command: >
      gunicorn varuna.wsgi:application
      --bind 0.0.0.0:80
      --workers ${VARUNA_GUNICORN_WORKERS:-4}
      --threads ${VARUNA_GUNICORN_THREADS:-8}
      --timeout ${VARUNA_GUNICORN_TIMEOUT_SECONDS:-120}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${VARUNA_BACKEND_LIMIT_MEMORY:-2G}
          cpus: '${VARUNA_BACKEND_LIMIT_CPUS:-2.0}'
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.create_connection(('127.0.0.1', 80), 2); s.close()\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - default
      - varuna-data

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: production
    depends_on:
      - backend
    ports:
      - "${VARUNA_FRONTEND_BIND_IP:-127.0.0.1}:${VARUNA_FRONTEND_HTTP_HOST_PORT:-80}:80"
    volumes:
      - static:/var/www/static:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${VARUNA_FRONTEND_LIMIT_MEMORY:-512M}
          cpus: '${VARUNA_FRONTEND_LIMIT_CPUS:-0.5}'

volumes:
  static:

networks:
  default:
    driver: bridge
  varuna-data:
    external: true
    name: varuna-data
