services:
  pg-varuna:
    image: postgres:15-alpine
    env_file:
      - docker/infra.shared.env
    environment:
      POSTGRES_DB: ${VARUNA_SHARED_PG_BOOTSTRAP_DB:-postgres}
      POSTGRES_USER: ${VARUNA_SHARED_PG_SUPERUSER:-postgres}
      POSTGRES_PASSWORD: ${VARUNA_SHARED_PG_SUPERPASS:-postgres}
    volumes:
      - pg_varuna_data:/var/lib/postgresql/data
    ports:
      - "${VARUNA_SHARED_PG_BIND_IP:-127.0.0.1}:${VARUNA_SHARED_PG_VARUNA_HOST_PORT:-55432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - varuna-data

  pg-zabbix:
    image: postgres:15-alpine
    env_file:
      - docker/infra.shared.env
    command:
      - postgres
      # ── Connection limits ──
      - -c
      - max_connections=${ZBX_PG_MAX_CONNECTIONS:-150}
      # ── Memory ──
      - -c
      - shared_buffers=${ZBX_PG_SHARED_BUFFERS:-2GB}
      - -c
      - effective_cache_size=${ZBX_PG_EFFECTIVE_CACHE_SIZE:-6GB}
      - -c
      - work_mem=${ZBX_PG_WORK_MEM:-4MB}
      - -c
      - maintenance_work_mem=${ZBX_PG_MAINTENANCE_WORK_MEM:-512MB}
      # ── WAL / write throughput ──
      - -c
      - wal_compression=${ZBX_PG_WAL_COMPRESSION:-on}
      - -c
      - max_wal_size=${ZBX_PG_MAX_WAL_SIZE:-4GB}
      - -c
      - min_wal_size=${ZBX_PG_MIN_WAL_SIZE:-1GB}
      - -c
      - wal_buffers=${ZBX_PG_WAL_BUFFERS:-64MB}
      - -c
      - synchronous_commit=${ZBX_PG_SYNCHRONOUS_COMMIT:-off}
      - -c
      - checkpoint_completion_target=${ZBX_PG_CHECKPOINT_COMPLETION_TARGET:-0.9}
      - -c
      - checkpoint_timeout=${ZBX_PG_CHECKPOINT_TIMEOUT:-15min}
      # ── I/O ──
      - -c
      - random_page_cost=${ZBX_PG_RANDOM_PAGE_COST:-1.1}
      - -c
      - effective_io_concurrency=${ZBX_PG_EFFECTIVE_IO_CONCURRENCY:-200}
    environment:
      POSTGRES_DB: ${ZABBIX_POSTGRES_DB:-zabbix}
      POSTGRES_USER: ${ZABBIX_POSTGRES_USER:-zabbix}
      POSTGRES_PASSWORD: ${ZABBIX_POSTGRES_PASSWORD:-zabbix}
    volumes:
      - pg_zabbix_data:/var/lib/postgresql/data
    ports:
      - "${VARUNA_SHARED_PG_BIND_IP:-127.0.0.1}:${VARUNA_SHARED_PG_ZABBIX_HOST_PORT:-55433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-zabbix} -d $${POSTGRES_DB:-zabbix}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - varuna-data

  zabbix-server:
    image: zabbix/zabbix-server-pgsql:alpine-7.0-latest
    depends_on:
      pg-zabbix:
        condition: service_healthy
    env_file:
      - docker/infra.shared.env
    environment:
      DB_SERVER_HOST: pg-zabbix
      POSTGRES_DB: ${ZABBIX_POSTGRES_DB:-zabbix}
      POSTGRES_USER: ${ZABBIX_POSTGRES_USER:-zabbix}
      POSTGRES_PASSWORD: ${ZABBIX_POSTGRES_PASSWORD:-zabbix}
      ZBX_STARTPOLLERS: ${ZBX_STARTPOLLERS:-30}
      ZBX_STARTPOLLERSUNREACHABLE: ${ZBX_STARTPOLLERSUNREACHABLE:-15}
      ZBX_STARTSNMPPOLLERS: ${ZBX_STARTSNMPPOLLERS:-80}
      ZBX_CACHESIZE: ${ZBX_CACHESIZE:-1G}
      ZBX_STARTPREPROCESSORS: ${ZBX_STARTPREPROCESSORS:-12}
      ZBX_STARTLLDPROCESSORS: ${ZBX_STARTLLDPROCESSORS:-4}
      ZBX_HISTORYCACHESIZE: ${ZBX_HISTORYCACHESIZE:-256M}
      ZBX_HISTORYINDEXCACHESIZE: ${ZBX_HISTORYINDEXCACHESIZE:-64M}
      ZBX_VALUECACHESIZE: ${ZBX_VALUECACHESIZE:-256M}
      ZBX_TRENDCACHESIZE: ${ZBX_TRENDCACHESIZE:-32M}
      ZBX_HOUSEKEEPINGFREQUENCY: ${ZBX_HOUSEKEEPINGFREQUENCY:-1}
      ZBX_MAXHOUSEKEEPERDELETE: ${ZBX_MAXHOUSEKEEPERDELETE:-100000}
      ZBX_TIMEOUT: ${ZBX_TIMEOUT:-10}
      ZBX_UNREACHABLEDELAY: ${ZBX_UNREACHABLEDELAY:-5}
      ZBX_UNAVAILABLEDELAY: ${ZBX_UNAVAILABLEDELAY:-15}
      ZBX_UNREACHABLEPERIOD: ${ZBX_UNREACHABLEPERIOD:-30}
    ports:
      - "${VARUNA_SHARED_PG_BIND_IP:-127.0.0.1}:${ZABBIX_SERVER_HOST_PORT:-10051}:10051"
    restart: unless-stopped
    networks:
      - varuna-data

  zabbix-web:
    image: zabbix/zabbix-web-nginx-pgsql:alpine-7.0-latest
    depends_on:
      zabbix-server:
        condition: service_started
      pg-zabbix:
        condition: service_healthy
    env_file:
      - docker/infra.shared.env
    environment:
      ZBX_SERVER_HOST: zabbix-server
      DB_SERVER_HOST: pg-zabbix
      POSTGRES_DB: ${ZABBIX_POSTGRES_DB:-zabbix}
      POSTGRES_USER: ${ZABBIX_POSTGRES_USER:-zabbix}
      POSTGRES_PASSWORD: ${ZABBIX_POSTGRES_PASSWORD:-zabbix}
      PHP_TZ: ${TZ:-America/Sao_Paulo}
    ports:
      - "${VARUNA_SHARED_PG_BIND_IP:-127.0.0.1}:${ZABBIX_WEB_HOST_PORT:-8080}:8080"
    restart: unless-stopped
    networks:
      - varuna-data

  zabbix-agent:
    image: zabbix/zabbix-agent2:alpine-7.0-latest
    depends_on:
      zabbix-server:
        condition: service_started
    environment:
      ZBX_HOSTNAME: Zabbix server
      ZBX_SERVER_HOST: zabbix-server
      ZBX_PASSIVE_ALLOW: "true"
      ZBX_ACTIVE_ALLOW: "true"
    restart: unless-stopped
    networks:
      - varuna-data

  zabbix-hardening:
    image: python:3.12-alpine
    depends_on:
      zabbix-web:
        condition: service_started
    env_file:
      - docker/infra.shared.env
    environment:
      ZABBIX_API_URL: http://zabbix-web:8080/api_jsonrpc.php
    volumes:
      - ./scripts/zabbix_harden_users.py:/opt/varuna/zabbix_harden_users.py:ro
    command: ["python", "/opt/varuna/zabbix_harden_users.py"]
    restart: "no"
    networks:
      - varuna-data

volumes:
  pg_varuna_data:
  pg_zabbix_data:

networks:
  varuna-data:
    name: varuna-data
    driver: bridge
