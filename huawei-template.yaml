                      if (!snmpIndex) return;

                      result.signal_quality.total_discovered_onus++;

                      var onuRxPower = onuRxPowerRaw ? roundTo2Decimals(parseFloat(onuRxPowerRaw) * 0.01) : null;

                      if (!isValidPower(onuRxPower)) onuRxPower = null;

                      if (onuRxPower !== null) {
