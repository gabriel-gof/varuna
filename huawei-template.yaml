        - uuid: bbefafc39a2a42cea26f90c17b214c35
          name: 'OLT: ONU Status Collection'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#INTERFACE_NAME},1.3.6.1.2.1.31.1.1.1.1, {#ONU_STATUS},1.3.6.1.4.1.2011.6.128.1.1.2.46.1.15, {#ONU_LAST_DOWN_CAUSE},1.3.6.1.4.1.2011.6.128.1.1.2.46.1.24]'
          key: onuStatusCollection
          delay: 10m
          history: 1d
          value_type: TEXT
          trends: '0'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  /**
                   * ONU Status Collection for Huawei OLT
                   * Provides OLT-wide and per-GPON aggregation
                   * Simplified: dying_gasp, link_loss, unknown categories only
                   */

                  var raw = JSON.parse(value);

                  // Build GPON interface mapping
                  var gponInterfaces = {};
                  raw.forEach(function(item) {
                      var interfaceName = item['{#INTERFACE_NAME}'];
                      var snmpIndex = item['{#SNMPINDEX}'];

                      if (interfaceName && interfaceName.match(/^GPON\s+\d+\/\d+\/\d+$/) && !item['{#ONU_STATUS}']) {
                          gponInterfaces[snmpIndex] = interfaceName;
                      }
                  });

                  // Counter factory
                  function newCounters() {
                      return {
                          online: 0,
                          offline: 0,
                          authorized: 0,
                          dying_gasp: 0,
                          link_loss: 0,
                          unknown: 0
                      };
                  }

                  function getStatusKey(status) {
                      switch(status) {
                          case '1': return 'online';
                          case '2': return 'offline';
                          default: return 'unknown';
                      }
                  }

                  function getCauseKey(cause) {
                      switch(cause) {
                          case '13': return 'dying_gasp';
                          case '1':
                          case '2':
                          case '3':
                          case '4':
                          case '5':
                          case '6':
                          case '15': return 'link_loss';
                          default: return 'unknown';
                      }
                  }

                  var oltTotal = newCounters();
                  var perGpon = {};

                  // Initialize ALL discovered GPON interfaces with zero counters
                  for (var snmpIndex in gponInterfaces) {
                      var gponInterface = gponInterfaces[snmpIndex];
                      perGpon[gponInterface] = newCounters();
                  }

                  // Process ONU entries
                  raw.forEach(function(item) {
                      var onuStatus = item['{#ONU_STATUS}'];
                      var lastDownCause = item['{#ONU_LAST_DOWN_CAUSE}'];
                      var snmpIndex = item['{#SNMPINDEX}'];

                      if (!onuStatus || !snmpIndex) return;

                      var ponIndex = snmpIndex.split('.')[0];
                      var gponInterface = gponInterfaces[ponIndex];

                      if (!gponInterface) return;

                      var statusKey = getStatusKey(onuStatus);
                      var causeKey = getCauseKey(lastDownCause);

                      // Count status
                      oltTotal[statusKey]++;
                      perGpon[gponInterface][statusKey]++;

                      // Count authorized (total)
                      oltTotal.authorized++;
                      perGpon[gponInterface].authorized++;

                      // Count offline details
                      if (statusKey !== 'online') {
                          if (causeKey) {
                              oltTotal[causeKey]++;
                              perGpon[gponInterface][causeKey]++;
                          }
                      }
                  });

                  return JSON.stringify({
                      total: oltTotal,
                      by_pon: perGpon
                  });
        - uuid: 59158f10c087411e89c0a1562f93b8fe
