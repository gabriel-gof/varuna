        - uuid: a3a53f1eab6c487ea27a4609c5a6e63a
          name: 'OLT: OLT Rx Power Collection'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#OLT_RX_POWER},1.3.6.1.4.1.2011.6.128.1.1.2.51.1.6]'
          key: oltRxPowerCollection
          delay: 1d
          history: 1d
          value_type: TEXT
          trends: '0'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  /**
                   * OLT Rx Power Collection - Huawei
                   * Walks OLT Rx power OID only
                   */

                  var raw = JSON.parse(value);
                  var result = {
                      power_data: {},
                      signal_quality: {
                          good_olt_rx: 0,
                          bad_olt_rx: 0,
                          total_discovered_onus: 0
                      }
                  };

                  var oltRxThreshold = parseFloat('{$OLT.RX.POWER.THRESHOLD}');

                  var MIN_VALID_POWER = -50;
                  var MAX_VALID_POWER = 10;

                  function roundTo2Decimals(value) {
                      return Math.round(value * 100) / 100;
                  }

                  function isValidPower(powerValue) {
                      if (powerValue === null || powerValue === undefined) return false;
                      if (isNaN(powerValue)) return false;
                      return (powerValue >= MIN_VALID_POWER && powerValue <= MAX_VALID_POWER);
                  }

                  raw.forEach(function(item) {
                      var snmpIndex = item['{#SNMPINDEX}'];
                      var oltRxPowerRaw = item['{#OLT_RX_POWER}'];

                      if (!snmpIndex) return;

                      result.signal_quality.total_discovered_onus++;

                      var oltRxPower = oltRxPowerRaw ? roundTo2Decimals((parseFloat(oltRxPowerRaw) - 10000) / 100) : null;

                      if (!isValidPower(oltRxPower)) oltRxPower = null;

                      if (oltRxPower !== null) {
                          result.power_data[snmpIndex] = {
                              olt_rx_power: oltRxPower
                          };

                          if (oltRxPower < oltRxThreshold) {
                              result.signal_quality.bad_olt_rx++;
                          } else {
                              result.signal_quality.good_olt_rx++;
                          }
                      }
                  });

                  return JSON.stringify(result);
        - uuid: b7e2f3a4c5d64ef8a9b0c1d2e3f4a5b6
