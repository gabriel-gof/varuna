                - |
                  /**
                   * ONU Rx Power Collection - Huawei
                   * Walks ONU Rx power OID only
                   */

                  var raw = JSON.parse(value);
                  var result = {
                      power_data: {},
                      signal_quality: {
                          good_onu_rx: 0,
                          bad_onu_rx: 0,
                          total_discovered_onus: 0
                      }
                  };

                  var onuRxThreshold = parseFloat('{$ONU.RX.POWER.THRESHOLD}');

                  var MIN_VALID_POWER = -50;
                  var MAX_VALID_POWER = 10;

                  function roundTo2Decimals(value) {
