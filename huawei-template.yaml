        - uuid: cf384773779b4812bd03562189484d84
          name: 'ONUs Discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#INTERFACE_NAME},1.3.6.1.2.1.31.1.1.1.1, {#ONU_NAME},1.3.6.1.4.1.2011.6.128.1.1.2.43.1.9]'
          key: onuDiscovery
          delay: 1d
          lifetime: 30d
          enabled_lifetime_type: DISABLE_NEVER
          item_prototypes:
            - uuid: 245de2c014504a868e0229d906cbc4ca
              name: 'ONU {#CHASSI}/{#SLOT}/{#PON}/{#ONU_ID} {#ONU_NAME}: OLT Rx power'
              type: DEPENDENT
              key: 'oltRxPower[{#PON_ID}.{#ONU_ID}]'
              delay: '0'
              history: 7d
              value_type: FLOAT
              trends: 180d
              units: dBm
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.power_data["{#PON_ID}.{#ONU_ID}"].olt_rx_power'
                  error_handler: DISCARD_VALUE
              master_item:
                key: oltRxPowerCollection
              tags:
                - tag: onu_power
                  value: olt_rx
            - uuid: 4634ee9918cc4ee2b89a04525285144c
              name: 'ONU {#CHASSI}/{#SLOT}/{#PON}/{#ONU_ID} {#ONU_NAME}: ONU Rx power'
              type: DEPENDENT
              key: 'onuRxPower[{#PON_ID}.{#ONU_ID}]'
              delay: '0'
              history: 7d
              value_type: FLOAT
              trends: 180d
              units: dBm
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.power_data["{#PON_ID}.{#ONU_ID}"].onu_rx_power'
                  error_handler: DISCARD_VALUE
              master_item:
                key: onuRxPowerCollection
              tags:
                - tag: onu_power
                  value: onu_rx
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  /**
                   * Huawei ONU Discovery - Fixed for actual SNMP data structure
                   * Handles real Huawei interface naming: "GPON 0/1/0" format
                   * Replicates discovery_huawei_onu_gpon.py logic exactly
                   */

                  var raw = JSON.parse(value);

                  /* 1. Build GPON port mapping (mimics get_gpon_port_name_and_port_id_list) */
                  var gponPortList = [];

                  raw.forEach(function(item) {
                      var interfaceName = item['{#INTERFACE_NAME}'];
                      var snmpIndex = item['{#SNMPINDEX}'];

                      // Only process GPON interface entries (no ONU_NAME field)
                      if (interfaceName && interfaceName.match(/^GPON\s+\d+\/\d+\/\d+$/) && !item['{#ONU_NAME}']) {
                          gponPortList.push({
                              portId: snmpIndex,
                              portName: interfaceName.replace('GPON ', '') // Remove "GPON " prefix to get "0/1/0"
                          });
                      }
                  });

                  /* 2. Process ONUs and correlate (mimics get_onus_info_detail) */
                  var onuList = [];

                  raw.forEach(function(item) {
                      var onuName = item['{#ONU_NAME}'];
                      var snmpIndex = item['{#SNMPINDEX}'];

                      // Process only ONU entries (have ONU_NAME)
                      if (!onuName || !snmpIndex) return;

                      // Extract ONU ID from SNMP index (last part after dot)
                      var onuId = snmpIndex.split('.').pop();

                      // Extract PON port index (part before the dot)
                      var ponIndex = snmpIndex.split('.')[0];

                      // Find matching GPON port by comparing port IDs
                      var matchedPort = null;
                      for (var i = 0; i < gponPortList.length; i++) {
                          var gponPort = gponPortList[i];
                          if (ponIndex === gponPort.portId) {
                              matchedPort = gponPort;
                              break;
                          }
                      }

                      if (!matchedPort) return;

                      // Parse port details: "0/1/0" -> chassi=0, slot=1, pon=0
                      var portDetail = matchedPort.portName.split("/");
                      if (portDetail.length !== 3) return;

                      var chassi = portDetail[0];
                      var slot = portDetail[1];
                      var pon = portDetail[2];

                      // Create ONU entry (exactly matching Python script output)
                      onuList.push({
                          "{#ONU_NAME}": onuName,
                          "{#CHASSI}": chassi,
                          "{#SLOT}": slot,
                          "{#PON}": pon,
                          "{#ONU_ID}": onuId,
                          "{#PON_ID}": ponIndex
                      });
                  });

                  /* 3. Return raw array for discovery rule */
                  return JSON.stringify(onuList);
