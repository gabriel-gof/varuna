zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: a8c9943dc8c743d99f7fb5c568507ca5
      name: Templates/OLT
  templates:
    - uuid: 14509e41e9ad4617a4f2f4dddf5779b2
      template: 'OLT Huawei Unified'
      name: 'OLT Huawei Unified'
      description: |
        Minimal template for Varuna collection.
        Scope:
        - ONU discovery
        - ONU status and disconnect reason (direct SNMP per ONU)
        - ONU RX and OLT RX power (direct SNMP per ONU)
      groups:
        - name: Templates/OLT
      macros:
        - macro: '{$VARUNA.DISCOVERY_INTERVAL}'
          value: 5m
        - macro: '{$VARUNA.STATUS_INTERVAL}'
          value: 1m
        - macro: '{$VARUNA.POWER_INTERVAL}'
          value: 5m
        - macro: '{$VARUNA.HISTORY_DAYS}'
          value: 7d
      discovery_rules:
        - uuid: 3dc9c2f00ac7462ab6600b26f2bf6e76
          name: 'ONU Discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#INTERFACE_NAME},1.3.6.1.2.1.31.1.1.1.1,{#SERIAL},1.3.6.1.4.1.2011.6.128.1.1.2.43.1.3,{#ONU_NAME},1.3.6.1.4.1.2011.6.128.1.1.2.43.1.9]'
          key: onuDiscovery
          delay: '{$VARUNA.DISCOVERY_INTERVAL}'
          lifetime_type: DELETE_IMMEDIATELY
          lifetime: '0'
          description: 'Builds ONU LLD rows from Huawei GPON interface map + ONU name table.'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var rows = JSON.parse(value);
                  var gponByIndex = {};

                  function normalizeSerial(raw) {
                      var serial = String(raw || '').trim().toUpperCase();
                      if (!serial || ['N/A', 'NA', 'NONE', 'NULL', '--', '-'].indexOf(serial) >= 0) {
                          return '';
                      }

                      var hexCandidate = serial.replace(/^0X/, '').replace(/[^0-9A-F]/g, '');
                      if (/^[0-9A-F]{16}$/.test(hexCandidate)) {
                          var vendorHex = hexCandidate.slice(0, 8);
                          var suffixHex = hexCandidate.slice(8);
                          var vendor = '';
                          var printableVendor = true;

                          for (var i = 0; i < 4; i++) {
                              var byteHex = vendorHex.slice(i * 2, i * 2 + 2);
                              var byteVal = parseInt(byteHex, 16);
                              if (!isFinite(byteVal) || byteVal < 0x20 || byteVal > 0x7E) {
                                  printableVendor = false;
                                  break;
                              }
                              vendor += String.fromCharCode(byteVal);
                          }

                          if (printableVendor) {
                              return vendor + suffixHex;
                          }
                      }

                      return serial;
                  }

                  rows.forEach(function(row) {
                      var iface = String(row['{#INTERFACE_NAME}'] || '').trim();
                      var idx = String(row['{#SNMPINDEX}'] || '').trim();
                      var onuName = String(row['{#ONU_NAME}'] || '').trim();

                      if (!idx || !iface) {
                          return;
                      }
                      if (!/^GPON\s+\d+\/\d+\/\d+$/.test(iface)) {
                          return;
                      }
                      if (onuName) {
                          return;
                      }
                      gponByIndex[idx] = iface.replace(/^GPON\s+/, '');
                  });

                  var output = [];

                  rows.forEach(function(row) {
                      var onuName = String(row['{#ONU_NAME}'] || '').trim();
                      var idx = String(row['{#SNMPINDEX}'] || '').trim();

                      if (!onuName || !idx) {
                          return;
                      }

                      var idxParts = idx.split('.');
                      if (idxParts.length < 2) {
                          return;
                      }

                      var ponId = idxParts[0];
                      var onuId = idxParts[idxParts.length - 1];
                      var gponPath = gponByIndex[ponId];
                      if (!gponPath) {
                          return;
                      }

                      var pathParts = gponPath.split('/');
                      if (pathParts.length !== 3) {
                          return;
                      }

                      output.push({
                          '{#SNMPINDEX}': idx,
                          '{#SERIAL}': normalizeSerial(row['{#SERIAL}']),
                          '{#ONU_NAME}': onuName,
                          '{#CHASSI}': pathParts[0],
                          '{#SLOT}': pathParts[1],
                          '{#PON}': pathParts[2],
                          '{#PON_ID}': ponId,
                          '{#ONU_ID}': onuId
                      });
                  });

                  return JSON.stringify(output);
          item_prototypes:
            - uuid: 6957e25d77ef433189b87170d516835f
              name: 'ONU {#SLOT}/{#PON}/{#ONU_ID} {#ONU_NAME} {#SERIAL}: Status'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.2011.6.128.1.1.2.46.1.15.{#PON_ID}.{#ONU_ID}'
              key: 'onuStatusValue[{#PON_ID}.{#ONU_ID}]'
              delay: '{$VARUNA.STATUS_INTERVAL}'
              history: '{$VARUNA.HISTORY_DAYS}'
              value_type: TEXT
              trends: '0'
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var raw = String(value || '').trim();
                      if (raw === '1') {
                          return 'online';
                      }
                      if (raw === '2') {
                          return 'offline';
                      }
                      return 'unknown';
                  error_handler: DISCARD_VALUE
              tags:
                - tag: collector
                  value: varuna
                - tag: metric
                  value: onu_status
            - uuid: a1f1f7dcfe9d4005ab32a112cdbf4119
              name: 'ONU {#SLOT}/{#PON}/{#ONU_ID} {#ONU_NAME} {#SERIAL}: Disconnect reason'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.2011.6.128.1.1.2.46.1.24.{#PON_ID}.{#ONU_ID}'
              key: 'onuDisconnectReason[{#PON_ID}.{#ONU_ID}]'
              delay: '{$VARUNA.STATUS_INTERVAL}'
              history: '{$VARUNA.HISTORY_DAYS}'
              value_type: TEXT
              trends: '0'
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var raw = String(value || '').trim();
                      if (raw === '13') {
                          return 'dying_gasp';
                      }
                      if (['1', '2', '3', '4', '5', '6', '15'].indexOf(raw) >= 0) {
                          return 'link_loss';
                      }
                      return 'unknown';
                  error_handler: DISCARD_VALUE
              tags:
                - tag: collector
                  value: varuna
                - tag: metric
                  value: disconnect_reason
            - uuid: e66d4e3982624888b6c40e18a4ad38a7
              name: 'ONU {#SLOT}/{#PON}/{#ONU_ID} {#ONU_NAME} {#SERIAL}: ONU Rx power'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.2011.6.128.1.1.2.51.1.4.{#PON_ID}.{#ONU_ID}'
              key: 'onuRxPower[{#PON_ID}.{#ONU_ID}]'
              delay: '{$VARUNA.POWER_INTERVAL}'
              history: '{$VARUNA.HISTORY_DAYS}'
              value_type: FLOAT
              trends: '0'
              units: dBm
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var n = parseFloat(value);
                      if (!isFinite(n)) {
                          return '';
                      }
                      n = n * 0.01;
                      if (Math.abs(n) < 0.0001 || Math.abs(n + 40) < 0.0001) {
                          return '';
                      }
                      if (n < -50 || n > 10) {
                          return '';
                      }
                      return Math.round(n * 100) / 100;
                  error_handler: DISCARD_VALUE
              tags:
                - tag: collector
                  value: varuna
                - tag: metric
                  value: onu_rx_power
            - uuid: d68342b4bd3a412f820ad876774f56a5
              name: 'ONU {#SLOT}/{#PON}/{#ONU_ID} {#ONU_NAME} {#SERIAL}: OLT Rx power'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.2011.6.128.1.1.2.51.1.6.{#PON_ID}.{#ONU_ID}'
              key: 'oltRxPower[{#PON_ID}.{#ONU_ID}]'
              delay: '{$VARUNA.POWER_INTERVAL}'
              history: '{$VARUNA.HISTORY_DAYS}'
              value_type: FLOAT
              trends: '0'
              units: dBm
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var n = parseFloat(value);
                      if (!isFinite(n)) {
                          return '';
                      }
                      n = (n - 10000) / 100;
                      if (Math.abs(n) < 0.0001 || Math.abs(n + 40) < 0.0001) {
                          return '';
                      }
                      if (n < -50 || n > 10) {
                          return '';
                      }
                      return Math.round(n * 100) / 100;
                  error_handler: DISCARD_VALUE
              tags:
                - tag: collector
                  value: varuna
                - tag: metric
                  value: olt_rx_power
