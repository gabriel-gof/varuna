      discovery_rules:
        - uuid: e332f13384a84a3aa0c41a9b6d57ef0a
          name: 'Network Interfaces Discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#IFOPERSTATUS},1.3.6.1.2.1.2.2.1.8,{#IFADMINSTATUS},1.3.6.1.2.1.2.2.1.7,{#IFALIAS},1.3.6.1.2.1.31.1.1.1.18,{#IFNAME},1.3.6.1.2.1.31.1.1.1.1,{#IFDESCR},1.3.6.1.2.1.2.2.1.2,{#IFTYPE},1.3.6.1.2.1.2.2.1.3]'
          key: net.if.discovery
          delay: 24h
          filter:
            evaltype: FORMULA
            formula: '(A and B) or C'
            conditions:
              - macro: '{#IFNAME}'
                value: (^GE\d+\/\d+$)
                formulaid: A
              - macro: '{#IFOPERSTATUS}'
                value: '1'
                formulaid: B
              - macro: '{#IFNAME}'
                value: (^GPON\d+\/\d+$)
                formulaid: C
          item_prototypes:
            - uuid: cd229020c10e4ac6a9b932e360a64e49
              name: 'Interface {#IFNAME}({#IFALIAS}): Bits received'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.31.1.1.1.6.{#SNMPINDEX}'
              key: 'net.if.in[ifHCInOctets.{#SNMPINDEX}]'
              history: 7d
              trends: 120d
              units: bps
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
                - type: MULTIPLIER
                  parameters:
                    - '8'
            - uuid: a2e611a1a49f45a496ed70045ee1285d
              name: 'Interface {#IFNAME}({#IFALIAS}): Bits sent'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.31.1.1.1.10.{#SNMPINDEX}'
              key: 'net.if.out[ifHCOutOctets.{#SNMPINDEX}]'
              history: 7d
              trends: 120d
              units: bps
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
                - type: MULTIPLIER
                  parameters:
                    - '8'
            - uuid: b7a90b9bf80940bcaa1fd4d27d918b67
              name: 'Interface {#IFNAME}({#IFALIAS}): Operational status'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.2.2.1.8.{#SNMPINDEX}'
              key: 'net.if.status[ifOperStatus.{#SNMPINDEX}]'
              history: 7d
              trends: 120d
              trigger_prototypes:
                - uuid: 1b54103fb1a842c7a94dec71c5285054
                  expression: 'last(/Template Gerenciatec OLT VSOL GPON/net.if.status[ifOperStatus.{#SNMPINDEX}])<>1'
                  name: 'Interface {#IFNAME}({#IFALIAS}): Link down'
                  priority: AVERAGE
