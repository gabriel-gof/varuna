services:
  db:
    image: postgres:15-alpine
    env_file:
      - docker/dev.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-varuna_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  web:
    build: 
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - docker/dev.env
    environment:
      - DJANGO_SETTINGS_MODULE=varuna.settings
      - DEBUG=True
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - static:/var/www/static
    working_dir: /app
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             python manage.py runserver 0.0.0.0:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: development
    depends_on:
      - web
    environment:
      - VITE_API_URL=/api
      - VITE_API_PROXY=http://web:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.js:/app/vite.config.js
    restart: unless-stopped
    command: npx vite --host 0.0.0.0 --port 3000

volumes:
  static:
  postgres_data:
