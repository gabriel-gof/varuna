version: '3.8'

services:
  db:
    image: postgres:15-alpine
    env_file:
      - docker/dev.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-varuna_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  web:
    build: 
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - docker/dev.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - static:/var/www/static
    restart: unless-stopped
    command: python manage.py runserver 0.0.0.0:8000

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: development
    depends_on:
      - web
    environment:
      VITE_API_URL: /api
      VITE_API_PROXY: http://web:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped
    command: npm run dev

volumes:
  static:
  postgres_data:
